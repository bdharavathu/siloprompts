services:
  siloprompts:
    build:
      context: .
      dockerfile: Dockerfile
    image: bdharavathu/siloprompts:latest
    container_name: siloprompts-web
    ports:
      - "5002:5000"
    volumes:
      # Mount prompts directory (read-write for editing via web UI)
      - ./prompts:/app/prompts
      # Mount data directory for application data (logs, cache, etc.)
      # Update this path to match your local system or use Docker volumes
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PROMPTS_DIR=/app/prompts
      - DATA_DIR=/app/data
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - siloprompts-network
    labels:
      - "com.siloprompts.description=SiloPrompts Web Interface"
      - "com.siloprompts.version=1.0.2"

networks:
  siloprompts-network:
    driver: bridge
    name: siloprompts-network
