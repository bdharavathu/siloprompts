apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siloprompts.fullname" . }}
  labels:
    {{- include "siloprompts.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "siloprompts.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "siloprompts.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "siloprompts.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.config.port }}
          protocol: TCP
        env:
        - name: FLASK_ENV
          value: {{ .Values.config.flaskEnv | quote }}
        - name: PORT
          value: {{ .Values.config.port | quote }}
        - name: PROMPTS_DIR
          value: {{ .Values.config.promptsDir | quote }}
        - name: DATA_DIR
          value: {{ .Values.config.dataDir | quote }}
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "siloprompts.fullname" . }}-secret
              key: secretKey
        volumeMounts:
        - name: prompts
          mountPath: {{ .Values.config.promptsDir }}
        - name: data
          mountPath: {{ .Values.config.dataDir }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      volumes:
      - name: prompts
        {{- if .Values.persistence.prompts.hostPath.enabled }}
        hostPath:
          path: {{ .Values.persistence.prompts.hostPath.path }}
          type: DirectoryOrCreate
        {{- else }}
        persistentVolumeClaim:
          claimName: {{ include "siloprompts.fullname" . }}-prompts-pvc
        {{- end }}
      - name: data
        {{- if .Values.persistence.data.hostPath.enabled }}
        hostPath:
          path: {{ .Values.persistence.data.hostPath.path }}
          type: DirectoryOrCreate
        {{- else }}
        persistentVolumeClaim:
          claimName: {{ include "siloprompts.fullname" . }}-data-pvc
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
