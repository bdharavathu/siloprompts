# Default values for siloprompts
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: bdharavathu/siloprompts
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80
  targetPort: 5000
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: siloprompts.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: siloprompts-tls
  #    hosts:
  #      - siloprompts.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  flaskEnv: production
  port: 5000
  promptsDir: /app/prompts
  dataDir: /app/data

# Secret configuration
secret:
  secretKey: "change-me-in-production"

# Persistent Volume Claims
persistence:
  prompts:
    enabled: true
    accessMode: ReadWriteOnce
    size: 500Mi
    storageClass: ""
    # For hostPath (development only)
    hostPath:
      enabled: false
      path: /path/to/prompts

  data:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ""
    # For hostPath (development only)
    # WARNING: Update the path below to match your system
    hostPath:
      enabled: false
      path: /path/to/your/data

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
