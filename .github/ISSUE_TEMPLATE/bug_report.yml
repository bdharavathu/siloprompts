name: Bug Report
description: Report a bug in SiloPrompts
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running SiloPrompts?
      options:
        - Docker
        - Docker Compose
        - Local (python app.py)
        - Kubernetes/Helm
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g., 1.0.3
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g., Chrome 120, Safari 17
