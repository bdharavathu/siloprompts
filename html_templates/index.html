<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiloPrompts - AI Prompt Database</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <img src="{{ url_for('static', filename='images/siloprompts-logo.svg') }}" alt="SiloPrompts" class="logo-icon" width="75" height="90">
                    SiloPrompts
                </h1>
                <p class="tagline">Your Personal AI Prompt Library</p>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-container">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search prompts... (e.g., 'debug', 'blog post', 'security')"
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">
                    <span class="search-icon">🔍</span>
                    Search
                </button>
                <button id="clearBtn" class="clear-btn" style="display: none;">
                    Clear
                </button>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="filters">
            <div class="category-pills" id="categoryFilter">
                <button class="pill active" data-category="all">All</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>Categories</h3>
                    <span id="categoryCount" class="count-badge">0</span>
                </div>
                <div id="categoriesList" class="categories-list">
                    <div class="loading">Loading categories...</div>
                </div>

                <div class="sidebar-stats">
                    <h4>Stats</h4>
                    <div class="stat-item">
                        <span>Total Prompts:</span>
                        <strong id="totalPrompts">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Categories:</span>
                        <strong id="totalCategories">0</strong>
                    </div>
                </div>
            </aside>

            <!-- Prompts Grid -->
            <main class="prompts-area">
                <div class="prompts-header">
                    <h2 id="viewTitle">All Prompts</h2>
                    <span id="promptCount" class="count-badge">0</span>
                </div>

                <div id="promptsList" class="prompts-grid">
                    <div class="loading">Loading prompts...</div>
                </div>

                <!-- Search Results -->
                <div id="searchResults" class="search-results" style="display: none;">
                    <div class="search-results-header">
                        <h3>Search Results</h3>
                        <span id="searchCount" class="count-badge">0</span>
                    </div>
                    <div id="searchResultsList"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Prompt Detail Modal -->
    <div id="promptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Prompt Details</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
