<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiloPrompts - AI Prompt Database</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/siloprompts-logo.svg') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <img src="{{ url_for('static', filename='images/siloprompts-logo.svg') }}" alt="SiloPrompts" class="logo-icon" width="75" height="90">
                    SiloPrompts
                </h1>
                <p class="tagline">Your Personal AI Prompt Library</p>
            </div>
            <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-container">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search prompts... e.g., 'debug', 'blog post', 'security' (⌘K)"
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">
                    <span class="search-icon">🔍</span>
                    Search
                </button>
                <button id="clearBtn" class="clear-btn" style="display: none;">
                    Clear
                </button>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="filters">
            <div class="category-pills-wrapper" id="categoryPillsWrapper">
                <div class="category-pills" id="categoryFilter">
                    <button class="pill active" data-category="all">All</button>
                </div>
            </div>
            <div class="tag-filters" id="tagFilter" style="display: none;"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>Categories</h3>
                    <span id="categoryCount" class="count-badge">0</span>
                </div>
                <div class="categories-list-wrapper" id="categoriesListWrapper">
                    <div id="categoriesList" class="categories-list">
                        <div class="loading">Loading categories...</div>
                    </div>
                </div>

                <div class="sidebar-stats">
                    <h4>Stats</h4>
                    <div class="stat-item">
                        <span>Total Prompts:</span>
                        <strong id="totalPrompts">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Categories:</span>
                        <strong id="totalCategories">0</strong>
                    </div>
                </div>
            </aside>

            <!-- Prompts Grid -->
            <main class="prompts-area">
                <div class="prompts-header">
                    <h2 id="viewTitle">All Prompts</h2>
                    <div class="prompts-header-right">
                        <span id="promptCount" class="count-badge">0</span>
                        <div class="sort-wrapper">
                            <button id="sortToggle" class="sort-toggle-btn" title="Sort prompts">☰</button>
                            <div id="sortDropdown" class="sort-dropdown" style="display:none;">
                                <button class="sort-option active" data-sort="name-asc">Name (A-Z)</button>
                                <button class="sort-option" data-sort="name-desc">Name (Z-A)</button>
                                <button class="sort-option" data-sort="modified">Recently Modified</button>
                                <button class="sort-option" data-sort="size">Size</button>
                            </div>
                        </div>
                        <button id="importBtn" class="import-btn">↓ Import</button>

                        <button id="newPromptBtn" class="new-prompt-btn">+ New Prompt</button>
                    </div>
                </div>

                <div id="promptsList" class="prompts-grid">
                    <div class="loading">Loading prompts...</div>
                </div>

                <!-- Search Results -->
                <div id="searchResults" class="search-results" style="display: none;">
                    <div class="search-results-header">
                        <h3>Search Results</h3>
                        <span id="searchCount" class="count-badge">0</span>
                    </div>
                    <div id="searchResultsList"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Prompt Detail Modal -->
    <div id="promptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Prompt Details</h2>
                <div class="modal-header-right">
                    <span id="modalActions"></span>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <span class="footer-version">SiloPrompts v{{ version }}</span>
            <span class="footer-slogan">Your Prompts. Your Rules.</span>
            <a href="https://github.com/bdharavathu/siloprompts" class="footer-link" target="_blank" rel="noopener">GitHub</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
